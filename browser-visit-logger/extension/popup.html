<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      padding: 14px;
      font-family: sans-serif;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 14px;
      color: #333;
    }
    button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
    }
    button:hover:not(:disabled) { background: #e0e0e0; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status {
      font-size: 12px;
      color: #555;
      margin-top: 6px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h3>Mark this page</h3>
  <button data-tag="memorable">&#9733; Memorable</button>
  <button data-tag="read">&#10003; Read</button>
  <button data-tag="skimmed">&#126; Skimmed</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
